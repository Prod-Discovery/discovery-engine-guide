<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discovery to Prototype Engine — Quick Start Guide</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --text-primary: #1a1a2e;
    --text-secondary: #444;
    --text-muted: #777;
    --bg-subtle: #f4f5f7;
    --border-color: #e0e2e6;
    --accent: #00b4d8;
    --accent-dark: #0077b6;
    --warn-bg: rgba(255, 183, 77, 0.08);
    --warn-border: rgba(255, 183, 77, 0.2);
    --accent-bg: rgba(0, 180, 216, 0.06);
    --accent-border: rgba(0, 180, 216, 0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif; color: var(--text-primary); background: #fff; }
  .wrap { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem; }
  .eyebrow { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.15em; color: var(--accent); margin-bottom: 0.6rem; text-transform: uppercase; }
  h1 { font-size: 1.75rem; font-weight: 700; line-height: 1.2; }
  .subtitle { font-size: 0.95rem; color: var(--text-muted); margin-top: 0.6rem; line-height: 1.5; }
  .tabs { display: flex; gap: 0.25rem; margin-bottom: 2rem; background: var(--bg-subtle); border-radius: 12px; padding: 4px; }
  .tab { flex: 1; padding: 0.65rem 0.5rem; border: none; border-radius: 9px; cursor: pointer; background: transparent; color: var(--text-muted); font-weight: 500; font-size: 0.78rem; transition: all 0.2s ease; font-family: inherit; line-height: 1.3; text-align: center; }
  .tab.active { background: white; color: var(--text-primary); font-weight: 600; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .tab-num { display: block; font-size: 0.65rem; margin-bottom: 2px; font-weight: 700; letter-spacing: 0.05em; color: var(--text-muted); }
  .tab.active .tab-num { color: var(--accent); }
  .step { display: none; min-height: 350px; }
  .step.active { display: block; }
  .step h2 { font-size: 1.25rem; font-weight: 700; margin: 0 0 1.25rem 0; }
  .step p { font-size: 1.05rem; line-height: 1.7; color: var(--text-secondary); margin-bottom: 1.5rem; }
  .step p.intro { font-size: 1.15rem; }
  code { background: var(--bg-subtle); padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.9rem; font-family: 'JetBrains Mono', 'SF Mono', monospace; }
  .card { background: var(--bg-subtle); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.25rem; }
  .card-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
  .card-icon { width: 42px; height: 42px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
  .card-title { font-weight: 600; color: var(--text-primary); font-size: 0.95rem; }
  .card-sub { font-size: 0.8rem; color: var(--text-muted); }
  .card-note { font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; }
  .tip { border: 1px solid var(--border-color); border-radius: 10px; padding: 1rem 1.25rem; font-size: 0.88rem; color: var(--text-secondary); line-height: 1.6; }
  .warn { background: var(--warn-bg); border: 1px solid var(--warn-border); border-radius: 10px; padding: 1rem 1.25rem; font-size: 0.88rem; color: var(--text-secondary); line-height: 1.6; margin-top: 0.5rem; }
  .accent-tip { background: var(--accent-bg); border: 1px solid var(--accent-border); border-radius: 10px; padding: 1rem 1.25rem; font-size: 0.85rem; color: var(--text-secondary); line-height: 1.6; margin-top: 0.75rem; }
  .accent-tip strong, .warn strong, .info-box strong { color: var(--text-primary); }
  .info-box { background: var(--bg-subtle); border-radius: 10px; padding: 1rem 1.25rem; font-size: 0.9rem; color: var(--text-secondary); line-height: 1.6; margin-top: 1rem; }
  .btn-download { padding: 0.55rem 1.2rem; border: none; border-radius: 8px; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: white; cursor: pointer; font-family: inherit; font-size: 0.88rem; font-weight: 600; flex-shrink: 0; }
  .btn-download:hover { opacity: 0.9; }
  .install-step { display: flex; gap: 1rem; margin-bottom: 1.25rem; align-items: flex-start; }
  .step-circle { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 0.9rem; flex-shrink: 0; margin-top: 2px; }
  .step-title { font-weight: 600; color: var(--text-primary); margin-bottom: 0.35rem; font-size: 0.95rem; }
  .step-desc { font-size: 0.88rem; color: var(--text-secondary); line-height: 1.6; }
  .cmd { background: #1a1a2e; color: #e0e0e0; border-radius: 8px; padding: 0.75rem 1rem; font-family: 'JetBrains Mono', monospace; font-size: 0.88rem; margin-top: 0.5rem; border: 1px solid rgba(255,255,255,0.08); }
  .cmd-prefix { color: #888; }
  .cmd-inline { background: #1a1a2e; color: #e0e0e0; border-radius: 6px; padding: 0.6rem 0.85rem; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; margin-bottom: 0.6rem; display: inline-block; border: 1px solid rgba(255,255,255,0.08); }
  .cmd-inline code { background: #1a1a2e; color: #e0e0e0; padding: 0.1rem 0.4rem; border-radius: 4px; font-size: 0.82rem; }
  .option-card { border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 0.75rem; border: 1px solid transparent; }
  .option-card.highlight { background: var(--accent-bg); border-color: rgba(0, 180, 216, 0.2); }
  .option-card:not(.highlight) { background: var(--bg-subtle); }
  .option-label { font-size: 0.85rem; color: var(--text-muted); line-height: 1.5; }
  .option-rec { font-size: 0.75rem; color: var(--accent); margin-top: 0.5rem; font-weight: 600; letter-spacing: 0.03em; }
  .phases { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin: 1.5rem 0; }
  .phase { border-radius: 12px; padding: 1.25rem; }
  .phase.sense { background: rgba(0, 180, 216, 0.06); border-left: 3px solid var(--accent); }
  .phase.shape { background: rgba(255, 183, 77, 0.08); border-left: 3px solid #ffb74d; }
  .phase-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em; margin-bottom: 0.75rem; }
  .phase.sense .phase-label { color: var(--accent); }
  .phase.shape .phase-label { color: #ffb74d; }
  .phase-item { font-size: 0.88rem; color: var(--text-secondary); padding: 0.3rem 0; display: flex; align-items: flex-start; gap: 0.5rem; }
  .phase-arrow { color: var(--text-muted); font-size: 0.75rem; margin-top: 2px; flex-shrink: 0; }
  .needs-box { background: var(--bg-subtle); border-radius: 10px; padding: 1.25rem; margin-top: 0.75rem; text-align: center; }
  .needs-title { font-size: 0.95rem; color: var(--text-primary); font-weight: 600; margin-bottom: 0.5rem; }
  .needs-list { font-size: 0.85rem; color: var(--text-muted); line-height: 1.7; }
  .needs-note { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.5rem; font-style: italic; }
  .nav { display: flex; justify-content: space-between; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color); }
  .btn-back, .btn-next { padding: 0.6rem 1.25rem; border-radius: 8px; font-family: inherit; font-size: 0.88rem; cursor: pointer; }
  .btn-back { border: 1px solid var(--border-color); background: white; color: var(--text-secondary); font-weight: 500; }
  .btn-back:disabled { color: #ccc; cursor: default; }
  .btn-next { border: none; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: white; font-weight: 600; }
  .btn-next:disabled { background: #ccc; cursor: default; }
</style>
</head>

function downloadPlugin() {
  const byteChars = atob(PLUGIN_B64);
  const byteNums = new Array(byteChars.length);
  for (let i = 0; i < byteChars.length; i++) byteNums[i] = byteChars.charCodeAt(i);
  const blob = new Blob([new Uint8Array(byteNums)], { type: "application/octet-stream" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = PLUGIN_FILENAME;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

let active = 0;

function render() {
  const tabsEl = document.getElementById('tabs');
  const stepsEl = document.getElementById('steps-container');
  tabsEl.innerHTML = steps.map((s, i) =>
    `<button class="tab ${i === active ? 'active' : ''}" onclick="setStep(${i})"><span class="tab-num">${s.num}</span>${s.label}</button>`
  ).join('');
  stepsEl.innerHTML = steps.map((s, i) =>
    `<div class="step ${i === active ? 'active' : ''}"><h2>${s.label}</h2>${s.html}</div>`
  ).join('');
  document.getElementById('btn-back').disabled = active === 0;
  document.getElementById('btn-next').disabled = active === steps.length - 1;
}

function setStep(i) { active = i; render(); }
function go(d) { active = Math.max(0, Math.min(steps.length - 1, active + d)); render(); }

render();
